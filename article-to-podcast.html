<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article Podcast</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fafafa;
    color: #333;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.4s ease;
  }

  body.has-result {
    justify-content: flex-start;
    padding-top: 48px;
  }

  .logo {
    font-size: 48px;
    font-weight: 300;
    letter-spacing: -1px;
    margin-bottom: 32px;
    transition: all 0.4s ease;
  }

  .logo span { color: #ea4335; }
  .logo em { font-style: normal; color: #4285f4; }
  .logo b { font-weight: 400; color: #34a853; }

  body.has-result .logo { font-size: 28px; margin-bottom: 20px; }

  .search-box {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 620px;
    background: #fff;
    border: 1px solid #dfe1e5;
    border-radius: 24px;
    padding: 6px 16px;
    box-shadow: 0 1px 6px rgba(32,33,36,0.08);
    transition: box-shadow 0.2s;
  }

  .search-box:focus-within {
    box-shadow: 0 1px 6px rgba(32,33,36,0.2);
    border-color: #ccc;
  }

  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    padding: 10px 8px;
    background: transparent;
    color: #333;
  }

  .search-box .listen-btn {
    background: #4285f4 !important;
    color: #fff;
    border: none;
    border-radius: 18px;
    padding: 8px 20px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    letter-spacing: 0.3px;
    display: inline-block;
    opacity: 1;
    visibility: visible;
  }

  .search-box .listen-btn:hover { background: #3367d6 !important; }

  .settings-row {
    display: flex;
    gap: 16px;
    margin-top: 16px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .settings-row label {
    font-size: 13px;
    color: #666;
  }

  .settings-row select {
    font-size: 13px;
    padding: 4px 8px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fff;
    outline: none;
  }

  .status {
    margin-top: 24px;
    font-size: 14px;
    color: #888;
    min-height: 20px;
    text-align: center;
    max-width: 620px;
  }

  .status.error { color: #ea4335; }

  .player-card {
    margin-top: 24px;
    background: #fff;
    border-radius: 16px;
    padding: 28px 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    max-width: 620px;
    width: 100%;
    display: none;
  }

  .player-card.visible { display: block; }

  .player-card h2 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .player-card .meta {
    font-size: 13px;
    color: #888;
    margin-bottom: 16px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .play-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: #4285f4;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .play-btn:hover { background: #3367d6; }
  .play-btn svg { width: 22px; height: 22px; fill: #fff; }

  .progress-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: #e8eaed;
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
  }

  .progress-fill {
    height: 100%;
    background: #4285f4;
    border-radius: 3px;
    width: 0%;
    transition: width 0.3s linear;
  }

  .progress-text {
    font-size: 11px;
    color: #999;
    display: flex;
    justify-content: space-between;
  }

  .article-preview {
    font-size: 13px;
    color: #666;
    line-height: 1.6;
    max-height: 120px;
    overflow-y: auto;
    border-top: 1px solid #eee;
    padding-top: 12px;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid #ddd;
    border-top-color: #4285f4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .tip {
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
    text-align: center;
  }

  .tip b { color: #888; font-weight: 500; }
</style>
</head>
<body>

<div class="logo"><span>Article</span> <b>Podcast</b></div>

<div class="search-box">
  <input type="text" id="urlInput" placeholder="Paste an article URL..." autofocus>
  <button class="listen-btn" onclick="convert()">Listen</button>
</div>

<div class="settings-row">
  <label>Voice:
    <select id="voice"></select>
  </label>
  <label>Speed:
    <select id="speed">
      <option value="0.8">0.8x</option>
      <option value="0.9">0.9x</option>
      <option value="1" selected>1x</option>
      <option value="1.2">1.2x</option>
      <option value="1.5">1.5x</option>
    </select>
  </label>
</div>

<div class="status" id="status"></div>

<div class="player-card" id="player">
  <h2 id="articleTitle"></h2>
  <div class="meta" id="articleMeta"></div>
  <div class="controls">
    <button class="play-btn" id="playBtn" onclick="togglePlayback()">
      <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" onclick="seekTo(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text">
        <span id="elapsed">0:00</span>
        <span id="remaining"></span>
      </div>
    </div>
  </div>
  <div class="article-preview" id="preview"></div>
</div>

<div class="tip"><b>Tip:</b> For best voices, try Microsoft Edge — it has natural-sounding voices built in.</div>

<script>
  // Kill speech on page refresh/close
  window.addEventListener('beforeunload', () => speechSynthesis.cancel());

  // ---- Voice setup ----
  const voiceSelect = document.getElementById('voice');
  let voices = [];

  function loadVoices() {
    voices = speechSynthesis.getVoices();
    voiceSelect.innerHTML = '';

    // Prefer natural / high-quality English voices
    const english = voices.filter(v => v.lang.startsWith('en'));
    const sorted = english.sort((a, b) => {
      // Prefer "Natural", "Online", "Enhanced" voices
      const aScore = /natural|online|enhanced|neural/i.test(a.name) ? 0 : 1;
      const bScore = /natural|online|enhanced|neural/i.test(b.name) ? 0 : 1;
      return aScore - bScore || a.name.localeCompare(b.name);
    });

    const toShow = sorted.length > 0 ? sorted : voices;
    let bestUkFemaleIdx = -1;
    toShow.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.dataset.voiceUri = v.voiceURI;
      const tag = /natural|online|enhanced|neural/i.test(v.name) ? ' ★' : '';
      opt.textContent = v.name.replace(/Microsoft |Google |Apple /g, '').substring(0, 30) + tag;
      voiceSelect.appendChild(opt);

      // Auto-select best UK English female voice
      if (bestUkFemaleIdx === -1 && v.lang.startsWith('en-GB')) {
        // Prefer voices with female-sounding names or "Female" in the name
        if (/female|fiona|hazel|libby|maisie|sonia|amy|emma|joanna/i.test(v.name)) {
          bestUkFemaleIdx = i;
        }
      }
    });

    // Fallback: any en-GB voice if no obvious female found
    if (bestUkFemaleIdx === -1) {
      bestUkFemaleIdx = toShow.findIndex(v => v.lang.startsWith('en-GB'));
    }

    if (bestUkFemaleIdx >= 0) {
      voiceSelect.selectedIndex = bestUkFemaleIdx;
    }
  }

  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();

  // Switch voice mid-playback
  voiceSelect.addEventListener('change', () => {
    if (isPlaying) {
      speechSynthesis.cancel();
      speakChunk(currentChunkIndex);
    }
  });

  // ---- State ----
  let articleContent = '';
  let articleTitle = '';
  let isPlaying = false;
  let currentUtterance = null;
  let totalWords = 0;
  let spokenChars = 0;
  let totalChars = 0;
  let chunks = [];
  let currentChunkIndex = 0;
  let progressInterval = null;

  // ---- Enter key ----
  document.getElementById('urlInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') convert();
  });

  function setStatus(msg, isError = false) {
    const el = document.getElementById('status');
    el.innerHTML = msg;
    el.className = 'status' + (isError ? ' error' : '');
  }

  // ---- Fetch + extract ----
  async function fetchArticle(url) {
    const proxies = [
      (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    ];
    let html = null;
    for (const proxy of proxies) {
      try {
        const resp = await fetch(proxy(url), { signal: AbortSignal.timeout(15000) });
        if (resp.ok) { html = await resp.text(); break; }
      } catch (e) { continue; }
    }
    if (!html) throw new Error('Could not fetch article. The site may block automated access.');
    return html;
  }

  function extractArticle(html, url) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    let title = '';
    const ogTitle = doc.querySelector('meta[property="og:title"]');
    if (ogTitle) title = ogTitle.content;
    else title = doc.querySelector('title')?.textContent || '';

    let site = '';
    try { site = new URL(url).hostname.replace('www.', ''); } catch(e) {}

    // Aggressively remove non-article elements
    const remove = [
      'script','style','nav','header','footer','aside','iframe','figure','figcaption',
      'button','svg','form','input','select','textarea','label',
      '[role="navigation"]','[role="banner"]','[role="complementary"]','[role="contentinfo"]',
      '[aria-hidden="true"]','[data-testid*="audio"]','[data-testid*="player"]',
      '.ad','[class*="sidebar"]','[class*="comment"]','[class*="footer"]',
      '[class*="nav"]','[class*="menu"]','[class*="social"]','[class*="share"]',
      '[class*="related"]','[class*="recommend"]','[class*="newsletter"]',
      '[class*="signup"]','[class*="sign-up"]','[class*="subscribe"]',
      '[class*="promo"]','[class*="banner"]','[class*="audio"]','[class*="player"]',
      '[class*="widget"]','[class*="toolbar"]','[class*="tooltip"]',
      '[class*="modal"]','[class*="popup"]','[class*="overlay"]',
      '[class*="callout"]','[class*="cta"]','[class*="ad-"]','[class*="advert"]',
      '[id*="comment"]','[id*="newsletter"]','[id*="subscribe"]',
      '[id*="audio"]','[id*="player"]','[id*="promo"]'
    ];
    remove.forEach(sel => {
      try { doc.querySelectorAll(sel).forEach(el => el.remove()); } catch(e) {}
    });

    // Extract using <p> tags only (much cleaner than textContent of whole containers)
    const selectors = ['article', '[role="main"]', 'main', '.post-content',
      '.article-content', '.entry-content', '.story-body', '.article-body'];

    let container = null;
    for (const sel of selectors) {
      const el = doc.querySelector(sel);
      if (el && el.textContent.trim().length > 200) { container = el; break; }
    }

    // Grab only <p> tags from the container (or whole doc as fallback)
    const scope = container || doc.body;
    const paras = [...scope.querySelectorAll('p')]
      .map(p => p.textContent.trim())
      .filter(t => t.length > 40)
      // Filter out common UI/promo junk lines
      .filter(t => !/sign up|subscribe|newsletter|listen.*\d+:\d+|seek\s*\d|log\s*in|create.*account|advertisement|sponsored|cookie/i.test(t));

    let content = paras.join('\n\n');

    // Clean up whitespace and stray UI artifacts
    content = content
      .replace(/\s+/g, ' ')
      .replace(/\n\s*\n/g, '\n\n')
      // Remove patterns like "Listen−1.0x+Seek0:00..." or time codes
      .replace(/Listen[−\-][\d.]+x\+Seek[\d:]+/gi, '')
      .replace(/\d+:\d{2}\s*/g, (match, offset, str) => {
        // Only remove bare timecodes not in sentences
        const before = str.substring(Math.max(0, offset - 5), offset);
        return /\w/.test(before) ? match : '';
      })
      .trim();

    return { title: title.trim(), site, content };
  }

  // ---- TTS playback ----
  function chunkText(text) {
    // Split into chunks of ~1000 chars on sentence boundaries
    // (speechSynthesis can stall on very long utterances)
    const MAX = 1000;
    const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
    const result = [];
    let current = '';
    for (const s of sentences) {
      if ((current + s).length > MAX && current) {
        result.push(current.trim());
        current = s;
      } else {
        current += s;
      }
    }
    if (current.trim()) result.push(current.trim());
    return result;
  }

  function getSelectedVoice() {
    const idx = voiceSelect.selectedIndex;
    if (idx < 0) return null;
    const uri = voiceSelect.options[idx].dataset.voiceUri;
    return voices.find(v => v.voiceURI === uri) || voices[0];
  }

  function speakChunk(index) {
    if (index >= chunks.length) {
      // Done
      stopPlayback();
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('elapsed').textContent = formatTime(totalWords / 2.5);
      return;
    }

    currentChunkIndex = index;
    const utterance = new SpeechSynthesisUtterance(chunks[index]);
    const voice = getSelectedVoice();
    if (voice) utterance.voice = voice;
    utterance.rate = parseFloat(document.getElementById('speed').value);
    utterance.pitch = 1;

    utterance.onend = () => {
      spokenChars += chunks[index].length;
      speakChunk(index + 1);
    };

    utterance.onerror = (e) => {
      if (e.error !== 'canceled') {
        console.error('Speech error:', e);
      }
    };

    currentUtterance = utterance;
    speechSynthesis.speak(utterance);
  }

  function startPlayback() {
    if (!articleContent) return;

    isPlaying = true;
    document.getElementById('playIcon').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';

    // Resume if paused
    if (speechSynthesis.paused) {
      speechSynthesis.resume();
    } else {
      chunks = chunkText(articleContent);
      totalChars = articleContent.length;
      spokenChars = 0;
      currentChunkIndex = 0;
      speakChunk(0);
    }

    // Progress tracking
    progressInterval = setInterval(updateProgress, 500);
  }

  function stopPlayback() {
    isPlaying = false;
    document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
    speechSynthesis.cancel();
    clearInterval(progressInterval);
  }

  function pausePlayback() {
    isPlaying = false;
    document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
    speechSynthesis.pause();
    clearInterval(progressInterval);
  }

  function togglePlayback() {
    if (isPlaying) {
      pausePlayback();
    } else {
      startPlayback();
    }
  }

  function updateProgress() {
    if (!isPlaying || totalChars === 0) return;
    // Estimate progress based on chunks completed + partial current chunk
    const chunkProgress = spokenChars / totalChars;
    const pct = Math.min(chunkProgress * 100, 100);
    document.getElementById('progressFill').style.width = pct + '%';

    const estTotalSec = totalWords / (2.5 * parseFloat(document.getElementById('speed').value));
    const elapsedSec = estTotalSec * (pct / 100);
    document.getElementById('elapsed').textContent = formatTime(elapsedSec);
    document.getElementById('remaining').textContent = '-' + formatTime(estTotalSec - elapsedSec);
  }

  function seekTo(event) {
    // Approximate seek by jumping to a chunk
    const bar = document.getElementById('progressBar');
    const pct = event.offsetX / bar.offsetWidth;
    const targetChunk = Math.floor(pct * chunks.length);

    speechSynthesis.cancel();
    spokenChars = 0;
    for (let i = 0; i < targetChunk; i++) spokenChars += chunks[i].length;

    isPlaying = true;
    document.getElementById('playIcon').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    speakChunk(targetChunk);
  }

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return m + ':' + String(s).padStart(2, '0');
  }

  // ---- Main convert ----
  async function convert() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { setStatus('Please paste an article URL.', true); return; }

    // Stop any current playback
    stopPlayback();
    document.getElementById('player').classList.remove('visible');
    document.body.classList.remove('has-result');

    try {
      setStatus('<span class="spinner"></span> Fetching article...');
      const html = await fetchArticle(url);

      setStatus('<span class="spinner"></span> Extracting content...');
      const { title, site, content } = extractArticle(html, url);

      if (content.length < 100) {
        throw new Error('Could not extract enough article text. The site may block automated access.');
      }

      articleContent = content;
      articleTitle = title;
      totalWords = content.split(/\s+/).length;

      const estMin = Math.ceil(totalWords / 150);
      document.getElementById('articleTitle').textContent = title || 'Untitled Article';
      document.getElementById('articleMeta').textContent = `${site} · ${totalWords.toLocaleString()} words · ~${estMin} min listen`;
      document.getElementById('preview').textContent = content.substring(0, 500) + (content.length > 500 ? '...' : '');
      document.getElementById('elapsed').textContent = '0:00';
      document.getElementById('remaining').textContent = '~' + estMin + ' min';
      document.getElementById('progressFill').style.width = '0%';

      document.getElementById('player').classList.add('visible');
      document.body.classList.add('has-result');
      setStatus('');

      // Auto-play after fetching
      startPlayback();

    } catch (err) {
      setStatus(err.message, true);
    }
  }
</script>

</body>
</html>
